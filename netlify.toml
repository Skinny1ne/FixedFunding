[build]
  # The directory where the app source code lives
  base = "app"
  
  # Use the standard build command; dependencies are handled by NPM_FLAGS
  command = "npm run build"
  
  # The directory that Netlify will serve (relative to the base directory)
  publish = "dist"

[build.environment]
  # This ensures Netlify's automatic dependency installation uses the legacy flag
  NPM_FLAGS = "--legacy-peer-deps"

[[redirects]]
  # This ensures that React Router works correctly on refresh
  from = "/*"
  to = "/index.html"
  status = 200
